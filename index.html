const cats = [
  {id:"all",label:"All"},{id:"shopping",label:"Shopping"},{id:"dining",label:"Dining"},
  {id:"street",label:"Street Food"},{id:"bakery",label:"Bakeries"},{id:"coffee",label:"Coffee & Tea"},
  {id:"watches",label:"Watches"},{id:"culture",label:"Culture"},{id:"hotel",label:"Hotels"},
  {id:"wine",label:"Wine Bars"},{id:"activities",label:"Activities"},{id:"bars",label:"Bars"},
  {id:"books",label:"Books"},
];

const catLabels = {shopping:"Shopping",vintage:"Vintage",designer:"Designer","multi-brand":"Multi-brand",consignment:"Consignment",knives:"Knives",ceramics:"Ceramics",design:"Design",mall:"Mall",jewellery:"Jewellery",beauty:"Beauty",electronics:"Electronics",dining:"Dining",bakery:"Bakery",coffee:"Coffee & Tea",
  watches:"Watches",culture:"Culture",street:"Street Food",hotel:"Hotel",
  wine:"Wine Bar",activities:"Activities",bars:"Bar"};

const catColors = {
  shopping:"#D4367A",dining:"#D95A38",bakery:"#C97C1A",coffee:"#0B8A6A",
  watches:"#1870C4",culture:"#5840D0",street:"#3D8010",hotel:"#888888",
  wine:"#A01C1C",activities:"#1678A0",bars:"#6B2DA8",books:"#2D7A4F",vintage:"#B5336A",designer:"#C4287A",
  "multi-brand":"#D4367A",consignment:"#A02060",
  knives:"#8B4513",ceramics:"#CD7F32",design:"#7A4F9C",
  mall:"#E05C8A",jewellery:"#C060A0",beauty:"#E080B0",electronics:"#606090"
};

let active = "all", viewMode = "list", leafletMap = null, markers = [];

// Filters
const filtersEl = document.getElementById("filters");
cats.forEach(c => {
  const b = document.createElement("button");
  b.className = "filter-btn" + (c.id === "all" ? " active" : "");
  b.textContent = c.label;
  b.onclick = () => {
    active = c.id;
    document.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  filtersEl.appendChild(b);
});

const SHOPPING_SUBS = new Set(["vintage","designer","multi-brand","consignment","knives","ceramics","design","mall","jewellery","beauty","electronics"]);
function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase();
  return places.filter(p => {
    const mc = active === "all"
      || p.cat === active
      || (active === "shopping" && SHOPPING_SUBS.has(p.cat));
    const mq = !q || p.name.toLowerCase().includes(q) || (p.desc||"").toLowerCase().includes(q);
    return mc && mq;
  });
}

function setView(v) {
  viewMode = v;
  document.getElementById("btn-list").classList.toggle("active", v === "list");
  document.getElementById("btn-map").classList.toggle("active", v === "map");
  document.getElementById("grid").style.display = v === "list" ? "" : "none";
  const mapEl = document.getElementById("map");
  if (v === "map") {
    mapEl.classList.add("visible");
    if (!leafletMap) initMap();
    else updateMarkers();
  } else {
    mapEl.classList.remove("visible");
  }
  render();
}

function initMap() {
  leafletMap = L.map("map", {zoomControl: true}).setView([22.32, 114.17], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18
  }).addTo(leafletMap);
  updateMarkers();
}

function makeIcon(cat) {
  const color = catColors[cat] || "#888";
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="${color}" stroke="white" stroke-width="2"/></svg>`;
  return L.divIcon({
    html: svg,
    className: "",
    iconSize: [20, 20],
    iconAnchor: [10, 10],
    popupAnchor: [0, -12]
  });
}

function updateMarkers() {
  if (!leafletMap) return;
  markers.forEach(m => leafletMap.removeLayer(m));
  markers = [];
  const filtered = getFiltered();
  document.getElementById("count").textContent = filtered.length + " place" + (filtered.length !== 1 ? "s" : "");
  filtered.forEach(p => {
    if (!p.lat || !p.lng) return;
    const priceStr = p.price ? " · " + p.price : "";
    const popup = `<strong>${p.name}</strong>${priceStr}<br><span class="pop-cat">${catLabels[p.cat]||p.cat}</span><br>${(p.desc||"").slice(0,80)}${(p.desc||"").length>80?"…":""}${p.url ? '<br><a href="'+p.url+'" target="_blank">Website →</a>' : ''}<br><a href="${p.maps}" target="_blank">Maps →</a>`;
    const m = L.marker([p.lat, p.lng], {icon: makeIcon(p.cat)})
      .bindPopup(popup)
      .addTo(leafletMap);
    markers.push(m);
  });
}

function render() {
  if (viewMode === "map") { updateMarkers(); return; }
  const filtered = getFiltered();
  document.getElementById("count").textContent = filtered.length + " place" + (filtered.length !== 1 ? "s" : "");
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No places found</div>'; return; }
  filtered.forEach(p => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = p.url || p.maps;
    a.target = "_blank";
    const priceStr = p.price ? ' <span style="opacity:0.5;font-size:10px">' + p.price + '</span>' : "";
    const subStr = p.sub ? ' <span style="font-size:9px;opacity:0.5;font-weight:400">' + p.sub + '</span>' : "";
    a.innerHTML =
      '<div class="card-top">' +
        '<span class="card-name">' + p.name + subStr + '</span>' +
        '<span class="card-cat cat-' + p.cat + '">' + (catLabels[p.cat]||p.cat) + priceStr + '</span>' +
      '</div>' +
      '<div class="card-desc">' + (p.desc||"") + '</div>' +
      (p.url ? '<a class="maps-link" href="' + p.url + '" target="_blank" onclick="event.stopPropagation()">Website / IG →</a> ' : '') +
      '<a class="maps-link" href="' + p.maps + '" target="_blank" onclick="event.stopPropagation()">Maps →</a>';
    grid.appendChild(a);
  });
}

render();
</script>
